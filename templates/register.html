<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5009751139401107" crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register - Wavelength</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="wrap">
    <span class="brand"><span class="dot"></span>Wavelength</span>
    <h1>Create an account</h1>
    <p class="tagline">Usernames must be more than <strong>4 characters</strong>.</p>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" minlength="5" maxlength="24"
             value="{{ username or '' }}" placeholder="At least 5 characters" required autofocus>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" minlength="6" placeholder="At least 6 characters" required>

      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" name="confirm" minlength="6" required>

      <button type="submit">Register</button>
    </form>

    <p class="switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>
</body>
</html>
