<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5009751139401107"
     crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Edit Profile - Wavelength</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
  .profile-shell {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .profile-card {
    background: var(--panel-raised, #1e212b);
    border: 1px solid var(--panel-line, #2a2d38);
    border-radius: 14px;
    padding: 32px;
    width: 100%;
    max-width: 380px;
  }
  .profile-card h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    margin: 0 0 4px;
  }
  .profile-card .sub {
    color: var(--muted, #9195a4);
    font-size: 13px;
    margin: 0 0 24px;
  }
  .profile-avatar-preview {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: var(--panel-line, #2a2d38);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 600;
    overflow: hidden;
    margin: 0 auto 20px;
  }
  .profile-avatar-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .profile-form {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .file-drop {
    border: 1px dashed var(--panel-line, #2a2d38);
    border-radius: 10px;
    padding: 18px;
    text-align: center;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted, #9195a4);
    transition: border-color 0.15s, color 0.15s;
  }
  .file-drop:hover {
    border-color: var(--signal, #6fcf97);
    color: var(--signal, #6fcf97);
  }
  .file-drop input[type="file"] { display: none; }
  .file-drop .file-name {
    display: block;
    margin-top: 6px;
    font-size: 12px;
    color: var(--fg, #e6e8ef);
  }
  .profile-form button[type="submit"] {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: var(--signal, #6fcf97);
    color: #14161c;
    font-weight: 600;
    cursor: pointer;
  }
  .profile-form button[type="submit"]:disabled {
    opacity: 0.6;
    cursor: default;
  }
  .msg {
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 4px;
  }
  .msg.error { background: rgba(255, 143, 107, 0.15); color: #ff8f6b; }
  .msg.success { background: rgba(111, 207, 151, 0.15); color: #6fcf97; }
  .back-link {
    display: inline-block;
    margin-top: 20px;
    font-size: 13px;
    color: var(--muted, #9195a4);
    text-decoration: none;
  }
  .back-link:hover { color: var(--fg, #e6e8ef); }
  .view-profile-link {
    display: inline-block;
    margin-top: 4px;
    font-size: 12px;
    color: var(--signal, #6fcf97);
    text-decoration: none;
  }
  .view-profile-link:hover { text-decoration: underline; }
  .field-label {
    font-size: 12px;
    color: var(--muted, #9195a4);
    margin-bottom: 4px;
    display: block;
  }
  textarea#bio-input {
    width: 100%;
    background: var(--panel, #171922);
    border: 1px solid var(--panel-line, #2a2d38);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--fg, #e6e8ef);
    font-family: inherit;
    font-size: 13px;
    resize: vertical;
    min-height: 72px;
    box-sizing: border-box;
  }
  .char-note {
    text-align: right;
    font-size: 11px;
    color: var(--muted, #9195a4);
    margin-top: 2px;
  }
</style>
</head>
<body class="dashboard-body">
  <div class="profile-shell">
    <div class="profile-card">
      <h1>Edit profile</h1>
      <p class="sub">Signed in as {{ username }}
        · <a href="{{ url_for('user_profile', username=username) }}" class="view-profile-link">View your public profile</a>
      </p>

      {% if error %}<div class="msg error">{{ error }}</div>{% endif %}
      {% if success %}<div class="msg success">{{ success }}</div>{% endif %}

      <div class="profile-avatar-preview" id="avatar-preview">
        {% if avatar_url %}
          <img src="{{ avatar_url }}" alt="{{ username }}">
        {% else %}
          {{ username[0]|upper }}
        {% endif %}
      </div>

      <form class="profile-form" method="POST" enctype="multipart/form-data" id="avatar-form">
        <label class="file-drop" id="file-drop">
          <span id="drop-label">Click to choose an image (PNG, JPG, GIF, WEBP)</span>
          <span class="file-name" id="file-name"></span>
          <input type="file" name="avatar" id="avatar-input" accept="image/png,image/jpeg,image/gif,image/webp">
        </label>

        <div>
          <label class="field-label" for="bio-input">Bio</label>
          <textarea name="bio" id="bio-input" maxlength="{{ bio_max_len or 280 }}" placeholder="Tell people a little about yourself...">{{ bio or '' }}</textarea>
          <div class="char-note"><span id="bio-count">{{ (bio or '')|length }}</span>/{{ bio_max_len or 280 }}</div>
        </div>

        <button type="submit" id="submit-btn">Save changes</button>
      </form>

      <a href="{{ url_for('index') }}" class="back-link">← Back to channels</a>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('avatar-input');
    const fileNameEl = document.getElementById('file-name');
    const dropLabel = document.getElementById('drop-label');
    const preview = document.getElementById('avatar-preview');
    const form = document.getElementById('avatar-form');
    const submitBtn = document.getElementById('submit-btn');

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      fileNameEl.textContent = file.name;
      dropLabel.textContent = 'Selected:';

      const reader = new FileReader();
      reader.onload = (e) => {
        preview.innerHTML = `<img src="${e.target.result}" alt="preview">`;
      };
      reader.readAsDataURL(file);
    });

    form.addEventListener('submit', () => {
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';
    });

    const bioInput = document.getElementById('bio-input');
    const bioCount = document.getElementById('bio-count');
    bioInput.addEventListener('input', () => {
      bioCount.textContent = bioInput.value.length;
    });
  </script>
</body>
</html>
